{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ todo.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>{{ todo.title }}</h1>
        <div class="card">
            <div class="card-body">
                <p><strong>Описание:</strong> {{ todo.description }}</p>
                <p><strong>Срок выполнения:</strong> {{ todo.due_date|date:"d.m.Y H:i" }}</p>
                <p><strong>Статус:</strong> {% if todo.status %}Выполнено{% else %}Не выполнено{% endif %}</p>
            </div>
        </div>
        <a href="{% url 'todos_list' %}" class="btn btn-secondary mt-3">Назад к списку</a>
    </div>
</body>
</html>
