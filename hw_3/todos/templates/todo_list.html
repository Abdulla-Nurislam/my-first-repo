<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="{% static 'todos/style.css' %}">
</head>
<body>
<h1>Todos</h1>
<a href="{% url 'todo_create' %}">Create New Todo</a>
    <ul>
        {% for todo in todos %}
            <li>
                <a href="{% url 'todo_detail' todo.id %}">{{ todo.title }}</a>
                <a href="{% url 'todo_delete' todo.id %}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
