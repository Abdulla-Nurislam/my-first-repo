<!DOCTYPE html>
<html>
<head>
    <title>Список студентов</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
        }
        h1 { 
            color: #333; 
        }
        ul { 
            list-style-type: none; 
            padding: 0; 
        }
        li { 
            background: #f4f4f4; 
            margin: 5px 0; 
            padding: 10px; 
            border-radius: 5px; 
        }
        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Студенты</h1>
    <ul>
        {% for student in students %}
            <li>
                <a href="{% url 'student-detail' student.pk %}">
                    {{ student.name }} {{ student.surname }} - {{ student.major }}, {{ student.year_of_study }} курс, {{ student.faculty }}
                </a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
