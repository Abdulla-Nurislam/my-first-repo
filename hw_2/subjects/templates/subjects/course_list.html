<!DOCTYPE html>
<html>
<head>
    <title>Список курсов</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
        }
        h1 { 
            color: #333; 
        }
        ul { 
            list-style-type: none; 
            padding: 0; 
        }
        li { 
            background: #f4f4f4; 
            margin: 5px 0; 
            padding: 10px; 
            border-radius: 5px; 
        }
        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Курсы</h1>
    <ul>
        {% for course in courses %}
            <li>
                <a href="{% url 'course-detail' course.pk %}">
                    {{ course.title }} (Преподаватель: {{ course.author }})
                </a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
