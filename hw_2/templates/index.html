<!DOCTYPE html>
<html>
<head>
    <title>Главная страница</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
        }
        h1 { 
            color: #333; 
        }
        .nav-links {
            margin: 20px 0;
            padding: 0;
            list-style: none;
        }
        .nav-links li {
            margin: 10px 0;
        }
        .nav-links a {
            display: inline-block;
            padding: 10px 20px;
            background: #f4f4f4;
            color: #333;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .nav-links a:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать!</h1>
    <ul class="nav-links">
        <li><a href="{% url 'student-list' %}">Список студентов</a></li>
        <li><a href="{% url 'course-list' %}">Список курсов</a></li>
    </ul>
</body>
</html>
