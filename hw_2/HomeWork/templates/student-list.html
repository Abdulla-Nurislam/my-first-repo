<!DOCTYPE html>
<html>
<head>
    <title>Список студентов</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 40px; 
        }
        h1 { 
            color: #333; 
        }
        ul { 
            list-style-type: none; 
            padding: 0; 
        }
        li { 
            background: #f4f4f4; 
            margin: 5px 0; 
            padding: 10px; 
            border-radius: 5px; 
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: blue;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Студенты</h1>
    <ul>
        {% for student in students %}
            <li>{{ student.name }} {{ student.surname }} - {{ student.major }}, {{ student.year_of_study }} курс, {{ student.faculty }}</li>
        {% endfor %}
    </ul>
    <a href="/" class="back-link">Вернуться на главную</a>
</body>
</html>
